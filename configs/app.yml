run_mode: "dev"

# 日誌設定：控制輸出等級與檔案輪替策略。
log:
    level: "info"
    filename: ""
    max_size: 10
    max_age: 7
    max_backups: 5

server:
    # API 服務對外監聽埠。
    port: "8080"

# AI 相關設定：包含語義決策、召回 embedding 與 reranker 精排。
ai:
    # 第一階段：embedding 向量服務（用於 top-k 候選召回）。
    embedding:
        url: "http://127.0.0.1:9000"
        timeout_seconds: 60
        max_attempts: 4
        retry_backoff_ms: 500
        path: "/embed"
        # 第一階段向量召回（top-k）最多取回幾筆候選。
        # 這一步要取得够多，確保正確候選不會在這階段就被漏掉，再交給 reranker 精排縮減。
        retrieval_top_k: 10
        # embedding 探活策略（毫秒）：
        # - alive_probe_interval_ms: 背景主動探活週期
        # - alive_probe_timeout_ms: 單次探活最長等待
        # - alive_success_ttl_ms: 成功後快取多久不再探活
        # - alive_failure_cooldown_ms: 失敗後多久內直接快回錯
        alive_probe_interval_ms: 2000
        alive_probe_timeout_ms: 1500
        alive_success_ttl_ms: 10000
        alive_failure_cooldown_ms: 3000
    # cross-encoder reranker (第二階段精排)
    # 用法：先由 embedding/pgvector 召回候選，再用 reranker 重排候選順序。
    # 調整方向：品質優先可拉高 timeout/attempts，延遲優先則反向調整。
    reranker:
        enabled: true
        url: "http://127.0.0.1:9001"
        timeout_seconds: 60
        max_attempts: 3
        retry_backoff_ms: 300
        path: "/rerank"
        # 第二階段精排後最終保留幾筆候選，這筆數會小於 retrieval_top_k，
        # 代表從較大候選集中縮減到最終要交給 semantic decision 判斷的筆數。
        top_k: 3
        # reranker 探活策略（毫秒），用途同 embedding。
        alive_probe_interval_ms: 2000
        alive_probe_timeout_ms: 1500
        alive_success_ttl_ms: 10000
        alive_failure_cooldown_ms: 3000

    # 語義決策服務（第三階段）
    # 職責：接收「原始訊息 + rerank 後候選」並產生單一最終 api_operation。
    # 注意：這裡的 API 契約是 action decision（api_operation），
    # 不再使用舊的 intent_label 分類格式。
    semantic_decision:
        service_url: "http://127.0.0.1:9002"
        service_timeout_seconds: 120
        # 最終 action decision 若低於此信心值，視為「對話問題」而非可執行指令。
        # 0 代表關閉此門檻機制。
        # 例如 no_match 或低匹配語意時，會改走 question_answer。
        command_confidence_threshold: 0.7
        # 問答模式回覆若低於此信心值，表示更適合交給 cloud LLM 回答。
        # 0 代表關閉此門檻機制。
        # 此值只影響是否標記 recommend_cloud_llm，不改變問答本身是否執行。
        question_confidence_threshold: 0.6

# 資料庫 schema 自動建立開關（開發環境常設為 true）。
