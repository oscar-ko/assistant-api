# run_mode 目前只有 dev 會被程式明確辨識為開發模式。
# dev: 啟用 dev-only GraphQL 模擬功能，並輸出 embedding/reranker 探活狀態轉換日誌。
# 非 dev 值: 視為一般非開發模式，不啟用上述 dev-only 行為。
run_mode: "dev"

# 日誌設定：控制輸出等級與檔案輪替策略。
log:
    level: "info"
    filename: ""
    max_size: 10
    max_age: 7
    max_backups: 5

server:
    # API 服務對外監聽埠。
    port: "8080"
    # Gin runtime mode: debug, release, or test.
    gin_mode: "debug"

ai:
    # 第一階段：embedding 向量服務（用於 top-k 候選召回）。
    embedding:
        target: "aistant.embedding"
        timeout_seconds: 60
        max_attempts: 4
        retry_backoff_ms: 500
        # 第一階段向量召回（top-k）最多取回幾筆候選。
        retrieval_top_k: 10
        # embedding 探活策略（毫秒）：
        # - alive_probe_interval_ms: 背景主動探活週期
        # - alive_probe_timeout_ms: 單次探活最長等待
        alive_probe_interval_ms: 2000
        alive_probe_timeout_ms: 1500
        # - alive_success_ttl_ms: 成功後快取多久不再探活
        alive_success_ttl_ms: 10000
        # - alive_failure_cooldown_ms: 失敗後多久內直接快回錯
        alive_failure_cooldown_ms: 3000

    # cross-encoder reranker（第二階段精排）
    # 用法：先由 embedding/pgvector 召回候選，再用 reranker 重排候選順序。
    reranker:
        enabled: true
        target: "aistant.reranker"
        timeout_seconds: 60
        # 第二階段精排後最終保留幾筆候選，這筆數會小於 retrieval_top_k，代表從較大候選集中縮減到最終要交給 semantic decision 判斷的筆數。
        top_k: 3
        # reranker 探活策略（毫秒），用途同 embedding。調整方向：品質優先可拉高 timeout/attempts，延遲優先則反向調整。
        alive_probe_interval_ms: 2000
        alive_probe_timeout_ms: 1500
        alive_success_ttl_ms: 10000
        alive_failure_cooldown_ms: 3000

    classifier:
        enabled: true
        target: "aistant.classifier"
        labels: []

    todo_reminder:
        # due_text 正規化使用的 IANA timezone；不同部署地區請明確覆寫。
        timezone: "Asia/Taipei"
        # 顯式 reply/quote 往上追溯 parent message 的最大層數。
        # 每層 parent 會建立一個 message window 並依時間合併；此值應小而明確，避免 prompt 過長。
        reply_chain_max_depth: 4
        # Todo Reminder 的近端歷史召回窗口，單位是「往前幾則同 channel 訊息」，不是時間長度。
        # 它只控制 recent window 的原始候選量；recent window 與 evidence 小窗合併後，仍會再受 max_context_messages 的總量限制。
        recent_context_message_limit: 16
        # 每個 candidate 最多取幾則活躍 evidence anchor 來重建長討論串上下文。
        evidence_anchor_limit_per_candidate: 5
        # 每個 evidence anchor 前後各取幾則同 channel 訊息形成小訊息窗。
        evidence_window_before_limit: 3
        evidence_window_after_limit: 3
        # 每次 implicit analysis 最多提供幾個 active candidate context 給 analyzer 比較。
        max_candidate_contexts: 5
        # recent window 與 evidence 小窗合併後，最多提供幾則 context messages 給 analyzer。
        max_context_messages: 40

    # LLM 互動服務（第三階段）
    # 職責：接收「原始訊息 + rerank 後候選」並產生單一最終 api_operation。
    llm_interaction:
        decision:
            profile: "aistant.llm"
            timeout: 120
            max_token: 1024
            temperature: 0.2
        chat:
            profile: "openai.chat_search"
            timeout: 120
            max_token: 1024
            temperature: null
            # 搜尋型 chat profile 不相容 response_format=json_object，因此在設定層關閉。 JSON 契約仍由 prompt 與後端 parse 驗證維持，不依賴 OpenAI 強制輸出模式。
            use_json_response_format: false
        translate:
            profile: "aistant.llm"
            timeout: 120
            max_token: 1024
            temperature: 0.2
        context_analyzer:
            profile: "deepseek.context_analyzer"
            timeout: 180
            max_token: 1024
            temperature: 0.1
        # ChatGPT/OpenAI 供應商設定（provider=chatgpt 時使用）。
        command_confidence_threshold: 0.7
        question_confidence_threshold: 0.6
        # action decision JSON 格式錯誤時，預設不重送，改為 fail-fast。
        decision_json_retry_count: 0

# LLM provider 分組設定：每個 provider 底下可放多個 profile。
llm_providers:
    # Aistant 自家 provider，本地契約端點以 profile 區分。
    aistant:
        type: "local"
        profiles:
            classifier:
                url: "http://127.0.0.1:9000"
                timeout_seconds: 30
                path: "/predict/classifier"
            embedding:
                url: "http://127.0.0.1:9001"
                path: "/embed"
            reranker:
                url: "http://127.0.0.1:9002"
                path: "/rerank"
            llm:
                url: "http://127.0.0.1:9003"
                # 本機 action decision 預設使用 9b，避免較小模型在嚴格 JSON contract 下不穩。
                model_name: "qwen3.5:9b"
                timeout_seconds: 120
                action_decision_path: "/predict/action_decision"
                question_answer_path: "/predict/question_answer"
                translate_path: "/translate"
            context_analyzer:
                url: "http://127.0.0.1:9003"
                model_name: "qwen3.5:4b"
                timeout_seconds: 180
                action_decision_path: "/predict/action_decision"
                question_answer_path: "/predict/question_answer"
                # context_analyzer 使用獨立 route，避免內部上下文判斷誤走一般生活問答端點。
                context_analyze_path: "/predict/context_analyze"
                # Todo Reminder 專用 structured analyzer，輸出固定 todo_analysis contract。
                todo_analyze_path: "/predict/todo_analyze"
                # Todo Reminder 專用 due_text 時間正規化 route，輸出固定 todo_due_time contract。
                todo_due_time_path: "/predict/todo_due_time_normalize"
                translate_path: "/translate"

    # OpenAI provider 設定：不同 profile 可依實際模型能力決定是否使用 JSON response format。
    openai:
        type: "cloud"
        url: "https://api.openai.com/v1"
        token: ""
        profiles:
            chat_search:
                model_name: "gpt-5-search-api-2025-10-14"
                timeout_seconds: 120
                max_tokens: 1024
                temperature: null
                use_json_response_format: false

    deepseek:
        type: "cloud"
        url: "https://api.deepseek.com/v1"
        token: "sk-80a8c57c17f2411b94d608d0b98b1619"
        profiles:
            chat:
                model_name: "deepseek-chat"
                timeout_seconds: 120
                max_tokens: 1024
                temperature: 0.2
            context_analyzer:
                model_name: "deepseek-chat"
                timeout_seconds: 180
                max_tokens: 1024
                temperature: 0.1
                use_json_response_format: true

