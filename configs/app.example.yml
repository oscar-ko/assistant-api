run_mode: "dev"

# 日誌設定：控制輸出等級與檔案輪替策略。
log:
    level: "info"
    filename: ""
    max_size: 10
    max_age: 7
    max_backups: 5

server:
    # API 服務對外監聽埠。
    port: "8080"

ai:
    # 第一階段：embedding 向量服務（用於 top-k 候選召回）。
    embedding:
        target: "aistant.embedding"
        timeout_seconds: 60
        max_attempts: 4
        retry_backoff_ms: 500
        # 第一階段向量召回（top-k）最多取回幾筆候選。
        retrieval_top_k: 10
        # embedding 探活策略（毫秒）：
        #背景主動探活週期
        alive_probe_interval_ms: 2000
        #單次探活最長等待
        alive_probe_timeout_ms: 1500
        #成功後快取多久不再探活
        alive_success_ttl_ms: 10000
        #失敗後多久內直接快回錯
        alive_failure_cooldown_ms: 3000

    reranker:
        enabled: true
        target: "aistant.reranker"
        timeout_seconds: 60
        # 第二階段精排後最終保留幾筆候選，這筆數會小於 retrieval_top_k，代表從較大候選集中縮減到最終要交給 semantic decision 判斷的筆數。
        top_k: 3
        # reranker 探活策略（毫秒），用途同 embedding。
        alive_success_ttl_ms: 10000
        alive_failure_cooldown_ms: 3000

    classifier:
        enabled: true
        target: "aistant.classifier"
        labels: []

    history_context:
        # 歷史訊息召回窗口，單位是「往前幾則同 channel 訊息」，不是時間長度。
        # 給需要近端對話上下文的服務共用，例如隱式回覆、補欄位、跨訊息語意接續判斷。
        recent_message_limit: 8

    todo_reminder:
        # due_text 正規化使用的 IANA timezone；不同部署地區請明確覆寫。
        timezone: "Asia/Taipei"

    # LLM 互動服務（第三階段）
    llm_interaction:
        decision:
            profile: "aistant.llm"
            timeout: 180
            max_token: 1024
            temperature: 0.2
        chat:
            # 公開版預設走本地 provider，避免 cloud token 留空時啟動失敗。
            profile: "aistant.llm"
            timeout: 120
            max_token: 1024
            temperature: null
        translate:
            profile: "aistant.llm"
            timeout: 120
            max_token: 1024
            temperature: 0.2
        context_analyzer:
            profile: "aistant.context_analyzer"
            timeout: 60
            max_token: 512
            temperature: 0.1
        chatgpt:
            url: "https://api.openai.com/v1"
            # 安全規範：公開版 app.yml 不放密鑰，請在 app.local.yml 填入實際 token。
            token: ""
            profiles:
                action_decision:
                    model_name: "gpt-4o-mini"
                    timeout_seconds: 120
                    max_tokens: 1024
                    temperature: 0.2
                chat_search:
                    model_name: "gpt-5-search-api-2025-10-14"
                    timeout_seconds: 120
                    max_tokens: 1024
                    temperature: null
        command_confidence_threshold: 0.7
        question_confidence_threshold: 0.6
        decision_json_retry_count: 0

# LLM provider 分組設定：每個 provider 底下可放多個 profile。
llm_providers:
    aistant:
        type: "local"
        profiles:
            classifier:
                url: "http://127.0.0.1:9000"
                timeout_seconds: 30
                path: "/predict/classifier"
            embedding:
                url: "http://127.0.0.1:9001"
                path: "/embed"
            reranker:
                url: "http://127.0.0.1:9002"
                path: "/rerank"
            llm:
                url: "http://127.0.0.1:9003"
                model_name: "qwen3.5:9b"
                timeout_seconds: 120
                action_decision_path: "/predict/action_decision"
                question_answer_path: "/predict/question_answer"
                translate_path: "/translate"
            context_analyzer:
                url: "http://127.0.0.1:9003"
                model_name: "qwen3.5:2b"
                timeout_seconds: 60
                action_decision_path: "/predict/action_decision"
                question_answer_path: "/predict/question_answer"
                # context_analyzer 使用獨立 route，避免內部上下文判斷誤走一般生活問答端點。
                context_analyze_path: "/predict/context_analyze"
                # Todo Reminder 專用 structured analyzer，輸出固定 todo_analysis contract。
                todo_analyze_path: "/predict/todo_analyze"
                # Todo Reminder 專用 due_text 時間正規化 route，輸出固定 todo_due_time contract。
                todo_due_time_path: "/predict/todo_due_time_normalize"
                translate_path: "/translate"

    openai:
        type: "cloud"
        url: "https://api.openai.com/v1"
        # 安全規範：公開版 app.yml 不放密鑰，請在 app.local.yml 填入實際 token。
        token: ""
        profiles:
            chat_search:
                model_name: "gpt-5-search-api-2025-10-14"
                timeout_seconds: 120
                max_tokens: 1024
                temperature: null
                # 搜尋型 chat profile 不相容 response_format=json_object，因此在設定層關閉。
                # JSON 契約仍由 prompt 與後端 parse 驗證維持，不依賴 OpenAI 強制輸出模式。
                use_json_response_format: false

# 資料庫 schema 自動建立開關（開發環境常設為 true）。
database:
    auto_schema_create: true

# PostgreSQL 連線資訊。
postgresql:
    address: "127.0.0.1:5432"
    database: "assistant_dev2"
    user_name: "postgres"
    password: ""
    parameters: "sslmode=disable"

